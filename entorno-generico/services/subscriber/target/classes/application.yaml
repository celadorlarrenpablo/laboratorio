spring:
  application:
    name: subscriber

nats:
  url: ${NATS_URL:nats://localhost:4222}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: WARN
    com.tucan.subscriber: INFO
  pattern:
    console: "%5p | Mensaje: %m | Clase: %logger | Metodo: %M | [Traza: %X{traceId:-}]%n"